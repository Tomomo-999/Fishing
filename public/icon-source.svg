<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0C2D48"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2E86C1" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1A5276" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- 波 -->
  <path d="M0 340 Q64 310 128 340 Q192 370 256 340 Q320 310 384 340 Q448 370 512 340 L512 512 L0 512 Z" fill="url(#wave)"/>
  <path d="M0 380 Q64 355 128 380 Q192 405 256 380 Q320 355 384 380 Q448 405 512 380 L512 512 L0 512 Z" fill="#1A5276" opacity="0.8"/>

  <!-- 釣り竿 -->
  <line x1="110" y1="80" x2="380" y2="200" stroke="#C8A050" stroke-width="14" stroke-linecap="round"/>
  <line x1="100" y1="90" x2="115" y2="75" stroke="#A07828" stroke-width="18" stroke-linecap="round"/>

  <!-- ライン -->
  <path d="M380 200 Q420 180 390 320" stroke="#AAD4F0" stroke-width="3" fill="none" stroke-dasharray="8,4"/>

  <!-- 魚 -->
  <g transform="translate(370, 330)">
    <!-- 魚体 -->
    <ellipse cx="0" cy="0" rx="52" ry="26" fill="#E8735A"/>
    <!-- 尾びれ -->
    <polygon points="-52,0 -76,-22 -76,22" fill="#C0392B"/>
    <!-- 背びれ -->
    <path d="M-10,-26 Q10,-50 30,-26" fill="#D55A40" stroke="none"/>
    <!-- 腹びれ -->
    <ellipse cx="5" cy="18" rx="14" ry="7" fill="#C0392B" opacity="0.7"/>
    <!-- 鱗の模様 -->
    <path d="M-20,0 Q-5,-15 10,0 Q-5,15 -20,0 Z" fill="#C0392B" opacity="0.5"/>
    <path d="M5,0 Q20,-15 35,0 Q20,15 5,0 Z" fill="#C0392B" opacity="0.5"/>
    <!-- 目 -->
    <circle cx="35" cy="-6" r="9" fill="white"/>
    <circle cx="37" cy="-6" r="5" fill="#1C2833"/>
    <circle cx="39" cy="-8" r="2" fill="white"/>
    <!-- 口 -->
    <path d="M48,0 Q52,6 48,10" stroke="#A03020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 波のきらめき -->
  <circle cx="80" cy="355" r="4" fill="white" opacity="0.5"/>
  <circle cx="200" cy="365" r="3" fill="white" opacity="0.4"/>
  <circle cx="320" cy="350" r="5" fill="white" opacity="0.5"/>
  <circle cx="440" cy="368" r="3" fill="white" opacity="0.4"/>

  <!-- テキスト -->
  <text x="256" y="470" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="52" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">海釣りナビ</text>
</svg>
